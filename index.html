<!DOCTYPE html>

<html lang="en">

<head>

<meta charset="utf-8" />

<meta name="viewport" content="width=device-width, initial-scale=1" />

<title>For My Baby Girl &lt;3</title>

<link rel="preconnect" href="https://fonts.googleapis.com">

<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="./styles.css" />

</head>

<body>

<div class="bg-glow"></div>

<!-- Blue-ish gamified background layer + clickable collectibles -->

<div class="bg-game" aria-hidden="true">

<div class="bg-grid"></div>

<div class="bg-stickers" id="bgStickers"></div>

</div>

<div class="toast" id="toast" role="status" aria-live="polite"></div>

<main class="shell">

<!-- Intro / Title page -->

<section id="intro" class="card intro" aria-live="polite">

<div class="sparkle" aria-hidden="true"></div>

<h1 class="title">For My Baby Girl &lt;3</h1>

<p class="subtitle">Take your time and read this! DONT RUSHHHH</p>

<div class="buttons">

<button id="startBtn" class="btn primary">Okay okay I’ll read</button>

<button id="tinyBtn" class="btn ghost" type="button" title="no speed running 😈">

I’m not speed running…

</button>

</div>

<p class="hint" id="speedHint">Tip: open each one slowly…</p>

</section>

<!-- Opening line page -->

<section id="letter" class="card hidden">

<header class="header">

<h2 class="opening">Hi you…. Yes you… My Baby Gurlllll</h2>

<p class="opening-sub">

and no, you’re not allowed to speed run this if youre thinking about it 😈

</p>

</header>

<div class="divider"></div>

<section class="accordion" aria-label="Birthday letter sections">

</section>

<footer class="footer">

Made with love — don’t rush 😈

</footer>

</section>

</main>

<canvas id="confetti" aria-hidden="true"></canvas>

<script src="./script.js"></script>

</body>

</html>
